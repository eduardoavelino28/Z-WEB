<header style="background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #00d2ff; position: sticky; top: 0; z-index: 1000;">
    <div onclick="toggleMenu()" style="cursor:pointer; color: #00d2ff; font-weight: bold; font-size: 1.2rem;">
        <i class="fas fa-bars"></i> Z-WEB
    </div>
    <div style="display: flex; gap: 15px; color: #fff;">
        <i class="fas fa-search" onclick="focarBusca()"></i>
        <i class="fas fa-shield-alt" onclick="senhaAdmin()"></i>
    </div>
</header>

<div id="busca-container" style="padding: 10px; background: #050505;">
    <div style="background: #1a1a1a; padding: 10px; border-radius: 20px; display: flex; align-items: center; gap: 10px; border: 1px solid #333;">
        <i class="fas fa-search" style="color: #00d2ff;"></i>
        <input type="text" id="inputBusca" placeholder="Buscar animes, mangás..." style="background: transparent; border: none; color: white; width: 100%; outline: none;">
    </div>
</div>
<div id="menuSide" style="position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: #111; z-index: 2000; transition: 0.3s; padding: 30px 20px; border-right: 2px solid #00d2ff; color: white;">
    <h3 style="color:#00d2ff; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">Z-PORTAL</h3>
    <div onclick="irPara('home')" style="padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer;"><i class="fas fa-home"></i> Início</div>
    <div onclick="irPara('favs')" style="padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer;"><i class="fas fa-heart"></i> Meus Favoritos</div>
    <div onclick="abrirEstatuto()" style="padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer; color: #ff3333;"><i class="fas fa-gavel"></i> Corregedoria</div>
    <div onclick="irPara('perfil')" style="padding: 15px 0; border-bottom: 1px solid #222; cursor: pointer;"><i class="fas fa-user-shield"></i> Área do Fundador</div>
</div>
<div id="overlay" onclick="toggleMenu()" style="position: fixed; display: none; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1500;"></div>
<script>
    function toggleMenu() {
        const menu = document.getElementById('menuSide');
        const overlay = document.getElementById('overlay');
        if (menu.style.left === '0px') {
            menu.style.left = '-100%';
            overlay.style.display = 'none';
        } else {
            menu.style.left = '0px';
            overlay.style.display = 'block';
        }
    }

    function focarBusca() {
        document.getElementById('inputBusca').focus();
    }

    function abrirEstatuto() {
        // Por enquanto um alerta, no próximo bloco faremos a tela bonita
        alert("🛡️ CORREGEDORIA Z-WEB\n\nStatus: Vigilância Ativa\nFundador: Eduardo Avelino");
        toggleMenu();
    }
</script>
