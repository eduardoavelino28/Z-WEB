<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Z-WEB | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg: #0a0c10; --card: #161b22; --accent: #00d2ff; --text: #f0f6fc; --border: #30363d; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; overflow-x: hidden; padding-bottom: 70px; }

        header { background: var(--card); padding: 15px; display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        
        /* MENU LATERAL CORRIGIDO */
        #side-menu { position: fixed; left: -100%; top: 0; width: 80%; height: 100%; background: var(--card); transition: 0.3s; z-index: 2000; padding: 20px; box-shadow: 5px 0 15px rgba(0,0,0,0.5); }
        #side-menu.active { left: 0; }
        .overlay { position: fixed; display: none; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1500; }
        .overlay.active { display: block; }

        /* SEÇÕES */
        .page { display: none; padding: 15px; }
        .page.active { display: block; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 15px; }

        /* LOGIN PROFISSIONAL */
        .auth-btn { width: 100%; padding: 12px; margin-bottom: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-google { background: #ffffff; color: #000; }
        .btn-fb { background: #1877f2; color: #fff; }

        /* NAVEGAÇÃO INFERIOR */
        nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; padding: 10px 0; border-top: 1px solid var(--border); z-index: 1000; }
        .nav-item { flex: 1; text-align: center; color: #8b949e; font-size: 0.7rem; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 1.3rem; display: block; margin-bottom: 2px; }

        /* ADMIN */
        #admin-box { display: none; margin-top: 20px; border-top: 1px solid var(--accent); padding-top: 15px; }
    </style>
</head>
<body>

<div class="overlay" onclick="toggleMenu()"></div>

<header>
    <div onclick="toggleMenu()"><i class="fas fa-bars"></i> Z-WEB</div>
    <i class="fas fa-shield-alt" onclick="acessoDono()"></i>
</header>

<div id="side-menu">
    <h2 style="color:var(--accent)">Menu Z-WEB</h2>
    <div style="margin-top:20px">
        <p onclick="showPage('home')"><i class="fas fa-home"></i> Início</p><br>
        <p onclick="alert('Regras da Corregedoria em breve')"><i class="fas fa-gavel"></i> Corregedoria</p>
    </div>
</div>

<main id="home" class="page active">
    <h3>🔥 Tendências</h3>
    <div class="card">
        <h4>Kage no Enjin</h4>
        <p>O império começa aqui.</p>
    </div>
</main>

<main id="debate" class="page">
    <h3>💬 Debate</h3>
    <div class="card" id="chat-box">Login necessário para debater.</div>
</main>

<main id="perfil" class="page">
    <h3>👤 Acesso</h3>
    <div class="card">
        <button class="auth-btn btn-google"><i class="fab fa-google"></i> Entrar com Google</button>
        <button class="auth-btn btn-fb"><i class="fab fa-facebook"></i> Entrar com Facebook</button>
        <hr style="border:0; border-top:1px solid #30363d; margin:15px 0;">
        <input type="email" placeholder="E-mail" style="width:100%; padding:10px; background:#000; border:1px solid #333; color:#fff; margin-bottom:10px;">
        <button class="auth-btn" style="background:var(--accent); color:#000;">Criar Conta</button>
    </div>

    <div id="admin-box">
        <h4>Painel do Dono</h4>
        <textarea id="p-text" placeholder="Texto da postagem" style="width:100%; height:80px; margin-bottom:10px;"></textarea>
        <button onclick="alert('Postagem enviada!')" style="background:green; color:white; padding:10px; width:100%; border:none;">Publicar Agora</button>
    </div>
</main>

<nav>
    <div class="nav-item active" id="n-home" onclick="showPage('home')"><i class="fas fa-home"></i>Início</div>
    <div class="nav-item" id="n-debate" onclick="showPage('debate')"><i class="fas fa-comments"></i>Debate</div>
    <div class="nav-item" id="n-perfil" onclick="showPage('perfil')"><i class="fas fa-user"></i>Perfil</div>
</nav>

<script>
    function toggleMenu() {
        document.getElementById('side-menu').classList.toggle('active');
        document.querySelector('.overlay').classList.toggle('active');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('n-'+id).classList.add('active');
        toggleMenu();
    }

    function acessoDono() {
        let pass = prompt("Senha do Fundador:");
        if(pass === "avelino2026") {
            showPage('perfil');
            document.getElementById('admin-box').style.display = 'block';
            alert("Bem-vindo, Eduardo!");
        }
    }
</script>

</body>
</html>
