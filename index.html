<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Z-WEB: A Corregedoria de Animes e Fantasia do Eduardo Avelino. Debates, tendências e comunidade.">
    <title>Z-WEB | Corregedoria de Animes</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0b1016; color: #fff; padding-bottom: 80px; }

        /* HEADER */
        header {
            background: #161b22; padding: 15px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 2px solid #00d2ff; position: sticky; top: 0; z-index: 100;
        }
        .logo-z { background: #00d2ff; color: #0b1016; padding: 2px 8px; font-weight: 900; border-radius: 4px; margin-right: 5px; }

        /* PAGINAÇÃO */
        .page { display: none; padding: 20px; animation: slideUp 0.3s ease; }
        .page.active { display: block; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* DEBATE STYLE */
        .post { background: #1c232d; border-radius: 12px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #00d2ff; }
        .btn-share { background: #00d2ff; border: none; padding: 8px 15px; border-radius: 5px; color: #0b1016; font-weight: bold; margin-top: 10px; cursor: pointer; }

        /* PERFIL STYLE */
        .rank-card { background: linear-gradient(45deg, #161b22, #00d2ff22); padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #00d2ff; }
        .xp-bar { width: 100%; height: 10px; background: #333; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .xp-fill { width: 45%; height: 100%; background: #00d2ff; }

        /* NAV */
        nav { position: fixed; bottom: 0; width: 100%; background: #161b22; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-item { text-align: center; font-size: 11px; color: #888; flex: 1; cursor: pointer; }
        .nav-item.active { color: #00d2ff; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div style="color:#00d2ff; font-size:24px;">☰</div>
        <div style="font-weight:900; font-size:20px;"><span class="logo-z">Z</span>WEB</div>
        <div style="color:#00d2ff; font-size:24px;">🔍</div>
    </header>

    <div id="home" class="page active">
        <h3 style="color:#00d2ff; margin-bottom:15px;">🔥 Tendências de Hoje</h3>
        <div style="width:100%; height:180px; background:url('https://images.alphacoders.com/134/1344840.png') center/cover; border-radius:10px;"></div>
        <p style="margin-top:10px; color:#888;">Novos capítulos de aventuras épicas comentados pela comunidade.</p>
    </div>

    <div id="debate" class="page">
        <h2 style="margin-bottom:20px;">💬 Mural da Corregedoria</h2>
        <div class="post">
            <strong>Eduardo Avelino</strong> <small style="color:#00d2ff;">• Autor</small>
            <p style="margin-top:10px;">Qual foi o plot twist que mais te chocou em animes de aventura esse ano?</p>
            <button class="btn-share" onclick="alert('Link copiado! Mande para seus grupos.')">🔗 Compartilhar Debate</button>
        </div>
    </div>

    <div id="perfil" class="page">
        <div class="rank-card">
            <div style="font-size:50px;">👤</div>
            <h2 id="userName">Visitante_88</h2>
            <p style="color:#00d2ff; font-weight:bold;">Nível 1 - Recruta</p>
            <div class="xp-bar"><div class="xp-fill"></div></div>
            <p style="font-size:12px; color:#888; margin-top:5px;">XP: 450 / 1000</p>
        </div>
        <button onclick="changeName()" style="width:100%; margin-top:15px; padding:10px; background:#1c232d; border:1px solid #333; color:#fff; border-radius:5px;">Mudar Nome de Usuário</button>
    </div>

    <nav>
        <div class="nav-item active" id="n-home" onclick="navTo('home')">🏠<br>Início</div>
        <div class="nav-item" id="n-debate" onclick="navTo('debate')">💬<br>Debate</div>
        <div class="nav-item" id="n-perfil" onclick="navTo('perfil')">👤<br>Perfil</div>
    </nav>

    <script>
        function navTo(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.getElementById('n-' + id).classList.add('active');
        }

        function changeName() {
            let novoNome = prompt("Digite seu novo nome:");
            if(novoNome) document.getElementById('userName').innerText = novoNome;
        }
    </script>
</body>
</html>
