<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Z-WEB | Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --bg: #0a0c10; --card: #161b22; --accent: #00d2ff; --text: #f0f6fc; 
            --danger: #ff4444; --warning: #ffcc00; --success: #2ea043; --border: #30363d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; padding-bottom: 80px; }

        /* HEADER */
        header { 
            background: var(--card); padding: 15px; border-bottom: 2px solid var(--accent); 
            display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; 
        }
        .logo { font-weight: 800; color: var(--accent); font-size: 1.3rem; letter-spacing: 1px; }

        /* CARROSSEL AUTOMÁTICO */
        .slider { width: 100%; height: 200px; overflow: hidden; position: relative; border-bottom: 1px solid var(--border); }
        .slides { display: flex; width: 300%; height: 100%; transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .slides img { width: 100%; height: 100%; object-fit: cover; }

        /* FEED ORGANIZADO */
        #feed { padding: 15px; display: flex; flex-direction: column-reverse; gap: 20px; }
        .card { background: var(--card); border-radius: 12px; overflow: hidden; border: 1px solid var(--border); position: relative; animation: fadeIn 0.5s; }
        .card img { width: 100%; max-height: 350px; object-fit: cover; border-bottom: 1px solid var(--border); }
        .card-body { padding: 15px; }
        .card-user { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; font-size: 0.9rem; color: var(--accent); }
        .verify-badge { color: var(--accent); font-size: 0.8rem; }
        
        /* BOTÃO APAGAR (MODO MODERAÇÃO) */
        .del-btn { 
            position: absolute; top: 10px; right: 10px; background: var(--danger); 
            color: white; border: none; border-radius: 5px; padding: 8px; display: none; cursor: pointer; z-index: 10;
        }

        /* PAINEL ADMIN (FULL SCREEN) */
        #admin-panel { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: var(--bg); z-index: 9999; display: none; padding: 20px; overflow-y: auto;
        }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid var(--accent); padding-bottom: 10px; }
        .admin-section { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid var(--border); }
        
        .input-style { width: 100%; padding: 12px; margin-bottom: 12px; background: #0d1117; border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 1rem; }
        .btn-action { width: 100%; padding: 12px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        
        /* BOTÕES DO PAINEL */
        .btn-post { background: var(--accent); color: #000; }
        .btn-warn { background: var(--warning); color: #000; }
        .btn-mute { background: #6e7681; color: white; }
        .btn-susp { background: orange; color: white; }
        .btn-ban { background: var(--danger); color: white; }
        .btn-verify { background: var(--success); color: white; }

        /* NAVEGAÇÃO INFERIOR */
        nav { 
            position: fixed; bottom: 0; width: 100%; background: var(--card); 
            display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid var(--border); z-index: 1000;
        }
        .nav-item { text-align: center; color: #8b949e; font-size: 0.7rem; cursor: pointer; }
        .nav-item i { font-size: 1.4rem; display: block; margin-bottom: 4px; }
        .nav-item.active { color: var(--accent); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">Z-WEB</div>
        <i class="fas fa-shield-alt" onclick="openAdmin()" style="color: #30363d; font-size: 1.4rem;"></i>
    </header>

    <div class="slider">
        <div class="slides" id="main-slider">
            <img src="https://images.unsplash.com/photo-1614850523296-d8c1af93d400?w=800" alt="Slide 1">
            <img src="https://images.unsplash.com/photo-1550684848-fac1c5b4e853?w=800" alt="Slide 2">
            <img src="https://images.unsplash.com/photo-1557683316-973673baf926?w=800" alt="Slide 3">
        </div>
    </div>

    <main id="feed">
        <div class="card">
            <div class="card-body">
                <div class="card-user"><i class="fas fa-check-circle"></i> <b>Sistema Z-WEB</b></div>
                <p>Bem-vindo, Fundador Eduardo. Seu painel de controle está pronto para a gestão 2026/2027.</p>
            </div>
        </div>
    </main>

    <div id="admin-panel">
        <div class="admin-header">
            <h2><i class="fas fa-gavel"></i> Corregedoria</h2>
            <i class="fas fa-times" onclick="closeAdmin()" style="font-size: 1.8rem;"></i>
        </div>

        <div class="admin-section">
            <h3>📝 Nova Publicação Oficial</h3>
            <input type="text" id="post-url" class="input-style" placeholder="Link da Imagem (URL)">
            <textarea id="post-desc" class="input-style" placeholder="Texto da publicação..." rows="3"></textarea>
            <button class="btn-action btn-post" onclick="publishPost()">LANÇAR NA REDE</button>
        </div>

        <div class="admin-section">
            <h3>👥 Gestão de Membros</h3>
            <p style="margin-bottom: 10px; font-size: 0.8rem; color: #8b949e;">Membro Selecionado: <b>Usuário_Demonstração</b></p>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                <button class="btn-action btn-warn" onclick="alert('Advertência aplicada!')">ADVERTIR</button>
                <button class="btn-action btn-mute" onclick="alert('Mute aplicado!')">MUTAR</button>
                <button class="btn-action btn-susp" onclick="alert('Suspensão aplicada!')">SUSPENDER</button>
                <button class="btn-action btn-ban" onclick="confirm('CONFIRMAR BANIMENTO PERMANENTE?')">BANIR</button>
            </div>
            <button class="btn-action btn-verify" onclick="alert('Selo de Verificado concedido!')">CONCEDER SELO OFICIAL</button>
        </div>

        <button onclick="toggleModMode()" style="width: 100%; background: #30363d; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold;">ATIVAR MODO APAGAR POSTS</button>
    </div>

    <nav>
        <div class="nav-item active" onclick="location.reload()">
            <i class="fas fa-home"></i>Início
        </div>
        <div class="nav-item" onclick="alert('O Chat em tempo real será ativado via Firebase.')">
            <i class="fas fa-comments"></i>Debate
        </div>
        <div class="nav-item" onclick="openAdmin()">
            <i class="fas fa-tools"></i>Painel
        </div>
    </nav>

    <script>
        // CONTROLE DO SLIDER
        let currentSlide = 0;
        setInterval(() => {
            currentSlide = (currentSlide + 1) % 3;
            document.getElementById('main-slider').style.transform = `translateX(-${currentSlide * 100}%)`;
        }, 4000);

        // ACESSO AO PAINEL
        function openAdmin() {
            const senha = prompt("Acesso do Fundador:");
            if(senha === "avelino2026") {
                document.getElementById('admin-panel').style.display = "block";
            } else {
                alert("Senha inválida!");
            }
        }

        function closeAdmin() {
            document.getElementById('admin-panel').style.display = "none";
        }

        // SISTEMA DE POSTAGEM
        function publishPost() {
            const url = document.getElementById('post-url').value;
            const desc = document.getElementById('post-desc').value;
            if(!desc) return alert("O texto é obrigatório!");

            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <button class="del-btn" onclick="this.parentElement.remove()"><i class="fas fa-trash"></i></button>
                ${url ? `<img src="${url}">` : ''}
                <div class="card-body">
                    <div class="card-user"><i class="fas fa-check-circle"></i> <b>Eduardo Avelino</b> <span class="verify-badge">(Fundador)</span></div>
                    <p>${desc}</p>
                </div>
            `;
            document.getElementById('feed').appendChild(card);
            
            // Limpar e fechar
            document.getElementById('post-url').value = "";
            document.getElementById('post-desc').value = "";
            closeAdmin();
        }

        // MODO MODERAÇÃO (APAGAR)
        let modMode = false;
        function toggleModMode() {
            modMode = !modMode;
            const btns = document.querySelectorAll('.del-btn');
            btns.forEach(b => b.style.display = modMode ? 'block' : 'none');
            alert(modMode ? "Modo Moderação: ON" : "Modo Moderação: OFF");
            if(modMode) closeAdmin();
        }
    </script>
</body>
</html>
